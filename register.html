<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | ISPHILO FRAGANCE</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--off-white);
            padding: 60px 20px;
        }
        .auth-card {
            background: var(--pure-white);
            width: 100%;
            max-width: 550px;
            padding: 60px 40px;
            border: 1px solid var(--gray-light);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }
        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--primary-red);
            text-transform: uppercase;
            margin-top: 15px;
        }
        .logo-text span {
            color: var(--pure-black);
        }
        .auth-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-top: 40px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .auth-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            opacity: 0.5;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }
        .form-group label {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
            color: var(--pure-black);
            font-weight: 800;
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--gray-light);
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            background: #FAFAFA;
            transition: var(--transition);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-red);
            background: var(--pure-white);
        }
        .btn-auth {
            width: 100%;
            margin-top: 20px;
            padding: 20px;
            background: var(--primary-red);
            color: white;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-auth:hover {
            background: var(--primary-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 46, 46, 0.2);
        }

        /* Social Login Styles */
        .social-separator {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: rgba(0,0,0,0.4);
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 600;
            text-transform: lowercase;
        }
        .social-separator::before,
        .social-separator::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--gray-light);
        }
        .social-separator span {
            padding: 0 15px;
        }
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .social-btn {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--gray-light);
            border-radius: 12px;
            background: var(--pure-white);
            color: var(--pure-black);
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }
        .social-btn:hover {
            background: var(--off-white);
            border-color: var(--gray);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <a href="index.html" style="text-decoration: none; display: flex; flex-direction: column; align-items: center;">
                <img src="Images/LOGO.jpg" alt="ISPHILO Logo" style="height: 80px; width: 80px; border: 2px solid var(--pure-black); padding: 2px;">
                <div class="logo-text">ISPHILO <span>FRAGANCE</span></div>
            </a>
            
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Join the elite fragrance community</p>

            <div id="reg-message" style="display: none; background: #fff3f3; color: var(--primary-red); padding: 15px; margin-bottom: 30px; border-radius: 4px; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border: 1px solid rgba(212, 46, 46, 0.2);">
                <!-- Dynamic Message -->
            </div>

            <form id="registerForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="reg-fname" placeholder="First Name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="reg-lname" placeholder="Last Name" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" placeholder="Email" required>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="reg-pass" placeholder="Create Password" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="reg-confirm" placeholder="Confirm Password" required>
                    </div>
                </div>

                <div style="text-align: left; margin-bottom: 20px; padding: 15px; background: var(--off-white); border: 1px solid var(--gray-light);">
                    <label style="font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; display: block;">Human Verification</label>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div id="captcha-box" style="background: var(--pure-white); padding: 10px; font-family: 'Montserrat', sans-serif; font-weight: 700; letter-spacing: 5px; font-style: italic; border: 1px solid var(--gray-light); user-select: none;">X7R2P</div>
                        <input type="text" id="reg-captcha" placeholder="Enter code" style="flex: 1; padding: 8px; border: 1px solid var(--gray-light);">
                    </div>
                </div>

                <div style="text-align: left; margin-bottom: 30px;">
                    <label style="display: flex; align-items: center; gap: 10px; font-family: 'Montserrat', sans-serif; font-size: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;">
                        <input type="checkbox" required style="width: auto;">
                        I agree to the <a href="terms.html" style="color: var(--primary-red); text-decoration: none; font-weight: 700;">Terms</a> & <a href="privacy.html" style="color: var(--primary-red); text-decoration: none; font-weight: 700;">Privacy</a>
                    </label>
                </div>

                <button type="submit" class="btn" id="regBtn" style="width: 100%; padding: 15px;">Register Account</button>
            </form>

            <div class="social-separator">
                <span>Or sign in with</span>
            </div>

            <div class="social-buttons">
                <a href="#" class="social-btn" title="Sign in with Google">
                    <i class="fab fa-google"></i>
                </a>
                <a href="#" class="social-btn" title="Sign in with Microsoft">
                    <i class="fab fa-windows"></i>
                </a>
                <a href="#" class="social-btn" title="Sign in with Apple">
                    <i class="fab fa-apple"></i>
                </a>
            </div>

            <p style="margin-top: 30px; font-family: 'Montserrat', sans-serif; font-size: 11px; opacity: 0.7; letter-spacing: 1px; text-transform: uppercase;">
                Already a member? <a href="login.html" style="color: var(--primary-red); text-decoration: none; font-weight: 700;">Sign In</a>
            </p>
        </div>
    </div>

    <!-- JS -->
    <script src="assets/js/db.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Auth State Check - Redirect if already logged in
        if (ISPHILO_DB.isLoggedIn()) {
            const user = ISPHILO_DB.getCurrentUser();
            window.location.href = user.role === 'admin' ? 'admin/dashboard.html' : 'customer-dashboard.html';
        }

        // Generate random captcha
        const captchaCode = Math.random().toString(36).substring(2, 7).toUpperCase();
        document.getElementById('captcha-box').textContent = captchaCode;

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fname = document.getElementById('reg-fname').value;
            const lname = document.getElementById('reg-lname').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-confirm').value;
            const captchaInput = document.getElementById('reg-captcha').value;
            const regBtn = document.getElementById('regBtn');
            const regMessage = document.getElementById('reg-message');
            
            if (captchaInput.toUpperCase() !== captchaCode) {
                alert('Human verification failed. Please try again.');
                return;
            }

            if (pass !== confirm) {
                alert('Passwords do not match!');
                return;
            }

            // UI Loading State
            regBtn.disabled = true;
            regBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            regMessage.style.display = 'none';
            
            const result = await ISPHILO_DB.register(fname + ' ' + lname, email, pass);
            
            if (result.success) {
                regMessage.style.display = 'block';
                regMessage.style.background = '#e8f5e9';
                regMessage.style.color = '#2e7d32';
                regMessage.style.borderColor = 'rgba(46, 125, 50, 0.2)';
                regMessage.innerHTML = '<i class="fas fa-check-circle" style="margin-right: 10px;"></i> Account created! Please verify your email to login.';
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } else {
                regBtn.disabled = false;
                regBtn.textContent = 'Register Account';
                regMessage.style.display = 'block';
                regMessage.style.background = '#fff3f3';
                regMessage.style.color = 'var(--primary-red)';
                regMessage.style.borderColor = 'rgba(212, 46, 46, 0.2)';
                regMessage.innerHTML = `<i class="fas fa-exclamation-circle" style="margin-right: 10px;"></i> ${result.message}`;
            }
        });
    </script>
</body>
</html>
