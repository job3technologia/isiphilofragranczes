<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | ISPHILO FRAGANCE</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--off-white);
            padding: 40px 20px;
        }
        .auth-card {
            background: var(--pure-white);
            width: 100%;
            max-width: 450px;
            padding: 60px 40px;
            border: 1px solid var(--gray-light);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }
        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--primary-red);
            text-transform: uppercase;
            margin-top: 15px;
        }
        .logo-text span {
            color: var(--pure-black);
        }
        .auth-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-top: 40px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .auth-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            opacity: 0.5;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }
        .form-group label {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
            color: var(--pure-black);
            font-weight: 800;
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--gray-light);
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            background: #FAFAFA;
            transition: var(--transition);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-red);
            background: var(--pure-white);
        }
        .btn-auth {
            width: 100%;
            margin-top: 20px;
            padding: 20px;
            background: var(--primary-red);
            color: white;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-auth:hover {
            background: var(--primary-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 46, 46, 0.2);
        }
        .step-2 { display: none; }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <a href="index.html" style="text-decoration: none; display: flex; flex-direction: column; align-items: center;">
                <img src="Images/LOGO.jpg" alt="ISPHILO Logo" style="height: 80px; width: 80px; border: 2px solid var(--pure-black); padding: 2px;">
                <div class="logo-text">ISPHILO <span>FRAGANCE</span></div>
            </a>
            
            <h2 class="auth-title">Reset Password</h2>
            <p id="reset-instruction" class="auth-subtitle">Enter your email to recover access</p>

            <!-- Step 1: Email Verification -->
            <form id="forgotForm" class="step-1">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reset-email" placeholder="Enter your registered email" required>
                </div>
                <button type="submit" class="btn-auth">Verify Email</button>
            </form>

            <!-- Step 2: New Password -->
            <form id="newPassForm" class="step-2">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-password" placeholder="Create new password" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn-auth">Update Password</button>
            </form>

            <p style="margin-top: 40px; font-family: 'Montserrat', sans-serif; font-size: 11px; opacity: 0.6; letter-spacing: 1px; text-transform: uppercase; font-weight: 600;">
                Remembered it? <a href="login.html" style="color: var(--primary-red); text-decoration: none; font-weight: 800;">Back to Login</a>
            </p>
        </div>
    </div>

    <!-- JS -->
    <script src="assets/js/db.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        let verifiedEmail = "";

        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('reset-email').value;
            const users = ISPHILO_DB.getUsers();
            const user = users.find(u => u.email === email);

            if (user) {
                verifiedEmail = email;
                document.querySelector('.step-1').style.display = 'none';
                document.querySelector('.step-2').style.display = 'block';
                document.getElementById('reset-instruction').textContent = "Verified! Create your new secure password.";
            } else {
                alert("Email not found in our luxury database.");
            }
        });

        document.getElementById('newPassForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            if (newPass !== confirmPass) {
                alert("Passwords do not match!");
                return;
            }

            const result = ISPHILO_DB.resetPassword(verifiedEmail, newPass);
            if (result.success) {
                alert("Password updated! You can now sign in with your new credentials.");
                window.location.href = 'login.html';
            } else {
                alert(result.message);
            }
        });
    </script>
</body>
</html>
